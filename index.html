<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SIWE Demo — Sign in</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; margin: 0; padding: 24px;
    box-sizing: border-box; text-align: center; gap: 16px;
  }
  h1 { font-size: 1.3rem; margin: 0; }
  p  { margin: 0; opacity: .8; max-width: 32rem; overflow-wrap: anywhere; }
  button {
    font-size: 1rem; padding: 14px 28px; border: 0; border-radius: 10px;
    background: #f6851b; color: #fff; font-weight: 600;
  }
  .hidden { display: none; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@metamask/sdk/dist/browser/iife/metamask-sdk.js"></script>
</head>
<body>
  <h1>Sign-In With Ethereum</h1>
  <p id="status">Preparing…</p>
  <button id="sign" class="hidden">Sign in with MetaMask</button>
  <button id="return" class="hidden">Return to the app</button>

<script>
  const APP_NAME = 'SIWE Demo';
  // Deep-link fallback used only when the page runs inside MetaMask's own
  // browser (no SiweBridge JavaScript channel available).
  const REDIRECT = 'siweapp://callback';

  const statusEl = document.getElementById('status');
  const signBtn = document.getElementById('sign');
  const returnBtn = document.getElementById('return');

  function status(text) { statusEl.textContent = text; }

  function toHex(str) {
    return '0x' + Array.from(new TextEncoder().encode(str))
      .map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function randomNonce(length = 16) {
    const chars =
      'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    return Array.from(crypto.getRandomValues(new Uint8Array(length)))
      .map(b => chars[b % chars.length]).join('');
  }

  // Hands the result to the Flutter app: preferably via the WebView's
  // JavaScript channel, otherwise via the return deep link.
  function report(payload) {
    if (window.SiweBridge) {
      SiweBridge.postMessage(JSON.stringify(payload));
      return;
    }
    const params = new URLSearchParams(payload).toString();
    const target = `${REDIRECT}?${params}`;
    // Browsers block custom-scheme navigation that isn't user-initiated
    // (MetaMask shows "this site was blocked from automatically opening an
    // external application"), so always offer a tap-to-return button too.
    returnBtn.classList.remove('hidden');
    returnBtn.onclick = () => { location.href = target; };
    location.href = target;
  }

  let sdk = null;

  async function getProvider() {
    if (window.ethereum) return window.ethereum; // MetaMask in-app browser.
    status('Loading MetaMask SDK…');
    if (!window.MetaMaskSDK) {
      throw new Error('MetaMask SDK failed to load. Check your connection.');
    }
    if (!sdk) {
      sdk = new MetaMaskSDK.MetaMaskSDK({
        dappMetadata: { name: APP_NAME, url: location.origin },
        checkInstallationImmediately: false,
        // Use native metamask:// deep links instead of the
        // https://metamask.app.link universal links: the universal links go
        // through Branch/the system browser, which can drop the channel
        // query params — MetaMask then opens without showing any request.
        useDeeplink: true,
        openDeeplink: (link) => { location.href = link; },
      });
      await sdk.init();
    }
    return sdk.getProvider();
  }

  async function signIn() {
    signBtn.classList.add('hidden');
    try {
      const ethereum = await getProvider();

      status('Connect and sign in MetaMask…');
      const [address] =
        await ethereum.request({ method: 'eth_requestAccounts' });
      const chainId =
        parseInt(await ethereum.request({ method: 'eth_chainId' }), 16);

      // EIP-4361 message. Domain/URI are those of this hosted page.
      const message =
        `${location.host} wants you to sign in with your Ethereum account:\n` +
        `${address}\n\n` +
        `Sign in with Ethereum to the ${APP_NAME} app.\n\n` +
        `URI: ${location.origin + location.pathname}\n` +
        `Version: 1\n` +
        `Chain ID: ${chainId}\n` +
        `Nonce: ${randomNonce()}\n` +
        `Issued At: ${new Date().toISOString()}`;

      status('Confirm the signature in MetaMask…');
      const signature = await ethereum.request({
        method: 'personal_sign',
        params: [toHex(message), address],
      });

      status('Signed! Returning to the app…');
      report({ address, signature });
    } catch (err) {
      if (err && err.code === 4001) {
        status('You rejected the request.');
      } else {
        status('Error: ' + (err && err.message ? err.message : err));
      }
      signBtn.textContent = 'Try again';
      signBtn.classList.remove('hidden');
    }
  }

  signBtn.onclick = signIn;

  if (window.ethereum) {
    // Inside MetaMask's browser the prompts appear in place — start at once.
    signIn();
  } else {
    // Inside the app's WebView, signing jumps out to the MetaMask app;
    // require a tap so the user initiates it.
    status('Sign the SIWE message with the MetaMask app.');
    signBtn.classList.remove('hidden');
  }
</script>
</body>
</html>
